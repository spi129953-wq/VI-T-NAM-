name: SSH via Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl wget

      - name: Setup SSH server
        run: |
          sudo useradd -m runner || true
          echo "runner:123456" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Install cloudflared
        run: |
          wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url ssh://localhost:22 --protocol quic > tunnel.log 2>&1 &
          sleep 8
          echo "====== Tunnel URL ======"
          cat tunnel.log
          echo "========================"

      - name: Keep runner alive
        run: |
          echo "SSH USER: runner"
          echo "SSH PASS: 123456"
          sleep 6h
