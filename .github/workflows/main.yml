name: SSH via Pinggy

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: Setup SSH user
        run: |
          sudo useradd -m runner || true
          echo "runner:123456" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Start Pinggy Tunnel
        run: |
          echo "Starting Pinggy tunnel..."
          ssh -p 443 -o StrictHostKeyChecking=no -R0:localhost:22 a.pinggy.io > pinggy.log 2>&1 &
          sleep 10
          echo "====== SSH ADDRESS ======"
          cat pinggy.log
          echo "========================="

      - name: Keep runner alive
        run: |
          echo "USER: runner"
          echo "PASS: 123456"
          sleep 6h
