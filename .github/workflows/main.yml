name: SSH via fxTunnel (Singapore)

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl
          sudo mkdir -p /var/run/sshd

      - name: Configure SSH
        run: |
          sudo useradd -m runner || true
          echo "runner:123456" | sudo chpasswd

          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config

          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Install fxtun
        run: |
          curl -fsSL https://fxtun.dev/install.sh | sh

      - name: Start TCP tunnel (Singapore)
        run: |
          fxtun tcp 22 \
            --token ${{ secrets.FXTUN_TOKEN }} \
            --server sg.fxtun.dev \
            > tunnel.log 2>&1 &
          sleep 15

      - name: Extract SSH endpoint
        run: |
          ENDPOINT=$(grep -oE 'tcp://[^ ]+' tunnel.log | head -n1 | sed 's/tcp:\/\///')
          HOST=$(echo $ENDPOINT | cut -d: -f1)
          PORT=$(echo $ENDPOINT | cut -d: -f2)

          echo ""
          echo "===================================="
          echo "SSH USER: runner"
          echo "SSH PASS: 123456"
          echo ""
          echo "SSH COMMAND:"
          echo "ssh runner@$HOST -p $PORT"
          echo "===================================="
          echo ""

          echo "::notice::SSH => ssh runner@$HOST -p $PORT"

      - name: Show tunnel log
        run: |
          echo "========== FXTUNNEL LOG =========="
          cat tunnel.log
          echo "=================================="

      - name: Keep runner alive
        run: |
          echo "Runner alive for ~6 hours"
          sleep 21600
